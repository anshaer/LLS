<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>莉莉絲的受難日</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container lang-zh">
        <div class="lang-switch">
            <span class="lang-btn active" onclick="changeLang('zh')">正體中文</span>
            <span class="lang-btn" onclick="changeLang('en')">English</span>
            <span class="lang-btn" onclick="changeLang('ja')">日本語</span>
        </div>

        <header>
            <h1 class="title">載入預言中...</h1>
            <div id="countdown" style="text-align:center; font-size:0.8rem; color:#666;"></div>
        </header>

        <main class="story-wrapper">
            <div id="story-content"></div>
        </main>

        <footer style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
            <span class="nav-symbol" onclick="prevPage()">☾</span>
            <span id="page-info" style="font-size:0.8rem;"></span>
            <span class="nav-symbol" onclick="nextPage()">☽</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
